services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${COMPOSE_PROJECT_NAME:-nextjs}_nextjs
    container_name: ${COMPOSE_PROJECT_NAME:-nextjs}_nextjs
    volumes:
      - ./nextjs/data:/nextjs/data:rw
      - ./.app.env:/nextjs/.env:ro
    environment:
      - VIRTUAL_HOST=${WEBSITE_URL_WITHOUT_HTTP}
      - LETSENCRYPT_HOST=${WEBSITE_URL_WITHOUT_HTTP}
      - LETSENCRYPT_EMAIL=${ADMIN_EMAIL}
      - VIRTUAL_PORT=80
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 250M
    restart: always
    depends_on:
      - migrate
    networks:
      - nginx-proxy
  migrate:
      build:
        dockerfile: Dockerfile
        target: build  # Use the build stage with dev dependencies
      image: ${COMPOSE_PROJECT_NAME:-nextjs}_migrate
      command: npx tsx lib/db/migrations/initializeUsers.ts
      volumes:
        - ./nextjs/data:/nextjs/data:rw
        - ./.app.env:/nextjs/.env:ro
      # Remove container after run
      restart: "no"
      network_mode: none
networks:
  nginx-proxy:
    name: nginx-proxy
    external: true

